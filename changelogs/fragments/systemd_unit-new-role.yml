major_changes:
  - |-
    systemd_unit - Add the ``systemd_unit`` role to deploy and manage systemd
    unit files (such as services, sockets, timers, or mounts) for both
    system-wide and user-specific sessions.
  - |-
    systemd_handler - Add the ``systemd_handler`` role to provide reusable
    Ansible handlers for managing systemd unit states and manager
    configurations.
